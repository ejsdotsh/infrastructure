# Linode-hosted DNS domain definitions.
# Each entry creates a domain and its associated records (MX, TXT, CNAME).

- domain: sahala.org
  soaEmail: domains@sahala.org

- domain: saha.la
  soaEmail: domains@saha.la
  mx:
    - priority: 10
      target: mail.protonmail.ch
    - priority: 20
      target: mailsec.protonmail.ch
  txt:
    - target: "protonmail-verification=667be840d8b900eb75aabe21850897781b4083fc"
    - target: "v=spf1 include:_spf.protonmail.ch mx ~all"
    - name: _dmarc
      target: "v=DMARC1; p=none"
  cname:
    - name: protonmail._domainkey
      target: protonmail.domainkey.dwyfiejqmt25ignanwa5si6rxkctauvcmvghmwwrdjj3q2ezokgeq.domains.proton.ch
    - name: protonmail2._domainkey
      target: protonmail2.domainkey.dwyfiejqmt25ignanwa5si6rxkctauvcmvghmwwrdjj3q2ezokgeq.domains.proton.ch
    - name: protonmail3._domainkey
      target: protonmail3.domainkey.dwyfiejqmt25ignanwa5si6rxkctauvcmvghmwwrdjj3q2ezokgeq.domains.proton.ch

