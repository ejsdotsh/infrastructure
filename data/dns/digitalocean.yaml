      target: "mail.protonmail.ch."
    - priority: 20
      target: "mailsec.protonmail.ch."
  ns:
    - target: "ns1.digitalocean.com."
    - target: "ns2.digitalocean.com."
    - target: "ns3.digitalocean.com."
